services:
  uni_agent_api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/code
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy  # 🔥 Baza TAM HAZIR olana qədər gözləyəcək!

  db:
    image: postgres:15-alpine
    container_name: uni_agent_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:  # 🔥 Baza konteynerinin daxildə tam hazır olub-olmadığını yoxlayır
      test: ["CMD-SHELL", "pg_isready -U user -d uni_agent_db"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  postgres_data: