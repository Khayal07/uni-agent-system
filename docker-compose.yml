services:
  db:
    image: postgres:15-alpine
    container_name: uni_agent_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: uni_agent_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d uni_agent_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    container_name: uni_agent_api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/backend
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/uni_agent_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: